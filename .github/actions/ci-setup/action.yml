name: Setup CI
description: Checkout-time setup shared by every CI job (git, pnpm, node, install)

inputs:
  NPM_TOKEN:
    description: npm auth token (only needed for jobs that publish)
    required: false

runs:
  using: composite
  steps:
    - name: setup git
      shell: bash
      run: |
        git config user.name github-actions
        git config user.email github-actions[bot]@users.noreply.github.com

    # No `version:` — pnpm/action-setup reads it from package.json's
    # `packageManager` field, keeping a single source of truth. Pinning it here
    # too errors with ERR_PNPM_BAD_PM_VERSION when the two disagree.
    - name: setup pnpm
      uses: pnpm/action-setup@v4

    - name: setup node
      uses: actions/setup-node@v4
      env:
        NODE_AUTH_TOKEN: ${{ inputs.NPM_TOKEN }}
      with:
        node-version-file: .nvmrc
        registry-url: https://registry.npmjs.org/
        cache: pnpm

    - name: install dependencies
      shell: bash
      env:
        HUSKY: 0
      run: pnpm install --frozen-lockfile
