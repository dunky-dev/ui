name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs for newer pushes.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # git, pnpm, node (.nvmrc), and a frozen install — same as CI.
      - uses: ./.github/actions/ci-setup

      # Reads the Pages config and exposes `base_path` for the build. Pages is
      # enabled out-of-band (Settings -> Pages -> Source: GitHub Actions) —
      # the workflow token can't create the site, so no `enablement: true`.
      - id: pages
        uses: actions/configure-pages@v5

      - name: Build Storybook
        # The project site is served under /<repo>/ (e.g. /ui/), so the
        # preview's assets must resolve there — main.ts feeds BASE_PATH into
        # Vite's base. `base_path` comes from the Pages config above.
        env:
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: pnpm build-storybook

      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/react/storybook-static

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
